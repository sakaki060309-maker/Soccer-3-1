<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer UI Phase0</title>
  <style>
    body {
      margin: 0;
      background: #e9e9e9;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
    }

    /* 1. 上の大きいログ欄 */
    .log-box {
      height: 520px;
      border: 4px solid #1e88e5;
      background: white;
      margin-bottom: 30px;
      padding: 20px;
      font-size: 48px;
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .log-title {
      font-size: 48px;
      margin-bottom: 30px;
    }

    .log-main {
      font-size: 72px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .log-sub {
      font-size: 48px;
    }

    /* 2. スコアエリア */
    .score-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .score-box {
      border: 4px solid #1e88e5;
      background: white;
      min-height: 150px;
      padding: 20px;
      color: #1565c0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .score-team {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .score-value {
      font-size: 56px;
      font-weight: bold;
    }

    /* 3. 下4つのボタン枠 */
    .menu-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .menu-btn {
      border: 4px solid #1e88e5;
      background: white;
      height: 90px;
      font-size: 40px;
      color: #1565c0;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    @media (max-width: 700px) {
      .log-box {
        height: 380px;
        font-size: 32px;
      }

      .log-title {
        font-size: 32px;
      }

      .log-main {
        font-size: 48px;
      }

      .log-sub {
        font-size: 32px;
      }

      .score-team {
        font-size: 32px;
      }

      .score-value {
        font-size: 40px;
      }

      .menu-btn {
        font-size: 28px;
        height: 70px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- 1. ログ欄 -->
    <div class="log-box">
      <div class="log-title">ログ</div>
      <div class="log-main">or</div>
      <div class="log-sub">試合画面</div>
    </div>

    <!-- 2. スコア -->
    <div class="score-row">
      <div class="score-box">
        <div class="score-team">Home</div>
        <div class="score-value">スコア 0</div>
      </div>

      <div class="score-box">
        <div class="score-team">Away</div>
        <div class="score-value">スコア 0</div>
      </div>
    </div>

    <!-- 3. 下メニュー -->
    <div class="menu-row">
      <div class="menu-btn">試合</div>
      <div class="menu-btn">チーム</div>
      <div class="menu-btn">？</div>
      <div class="menu-btn">？</div>
    </div>

  </div>
</body>
</html>
