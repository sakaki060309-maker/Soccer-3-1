<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer UI Phase0</title>

  <style>
    /* =========================================================
       1. 全体設定
    ========================================================= */
    body {
      margin: 0;
      background: #e9e9e9;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
    }

    /* =========================================================
       2. 上のログ欄
    ========================================================= */
    .log-box {
      height: 520px;
      border: 4px solid #1e88e5;
      background: white;
      margin-bottom: 30px;
      padding: 20px;
      font-size: 48px;
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .log-title {
      font-size: 48px;
      margin-bottom: 30px;
      color: #1565c0;
      font-weight: bold;
    }

    .log-main {
      font-size: 72px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .log-sub {
      font-size: 48px;
      text-align: center;
    }

    /* 2.1 ログ欄の中の開始ボタン */
    #startBtn {
      padding: 16px 36px;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 30px;
      border: 3px solid #1e88e5;
      background: #ffffff;
      color: #1565c0;
      cursor: pointer;
      border-radius: 12px;
    }

    #startBtn:hover {
      background: #e3f2fd;
    }

    /* =========================================================
       3. スコアエリア
    ========================================================= */
    .score-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .score-box {
      border: 4px solid #1e88e5;
      background: white;
      min-height: 150px;
      padding: 20px;
      color: #1565c0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .score-team {
      font-size: 48px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .score-value {
      font-size: 56px;
      font-weight: bold;
    }

    /* =========================================================
       4. 下4つのメニュー
    ========================================================= */
    .menu-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .menu-btn {
      border: 4px solid #1e88e5;
      background: white;
      height: 90px;
      font-size: 40px;
      font-weight: bold;
      color: #1565c0;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* =========================================================
       5. スマホ・小画面対応
    ========================================================= */
    @media (max-width: 700px) {
      .log-box {
        height: 380px;
        font-size: 32px;
      }

      .log-title {
        font-size: 32px;
      }

      .log-main {
        font-size: 48px;
      }

      .log-sub {
        font-size: 32px;
      }

      #startBtn {
        font-size: 24px;
        padding: 12px 24px;
      }

      .score-team {
        font-size: 32px;
      }

      .score-value {
        font-size: 40px;
      }

      .menu-btn {
        font-size: 28px;
        height: 70px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- =========================================================
         6. ログ欄
    ========================================================= -->
    <div class="log-box">

      <!-- 6.1 最初だけ表示する試合開始ボタン -->
      <button id="startBtn">試合開始</button>

    </div>

    <!-- =========================================================
         7. スコア表示
    ========================================================= -->
    <div class="score-row">
      <div class="score-box">
        <div class="score-team">Home</div>
        <div class="score-value">スコア 0</div>
      </div>

      <div class="score-box">
        <div class="score-team">Away</div>
        <div class="score-value">スコア 0</div>
      </div>
    </div>

    <!-- =========================================================
         8. 下メニュー
    ========================================================= -->
    <div class="menu-row">
      <div class="menu-btn">試合</div>
      <div class="menu-btn">チーム</div>
      <div class="menu-btn">？</div>
      <div class="menu-btn">？</div>
    </div>

  </div>

  <script>
    // =========================================================
    // 9. 要素を取得する部分
    // =========================================================
    const startBtn = document.getElementById("startBtn");
    const logMain = document.getElementById("logMain");
    const logSub = document.getElementById("logSub");

    // =========================================================
    // 10. 試合開始ボタンの処理
    // =========================================================
    startBtn.addEventListener("click", () => {
      // 10.1 ボタンを消す
      startBtn.style.display = "none";

      // 10.2 ログの文字を変える
      logMain.textContent = "試合開始";
      logSub.textContent = "ここから試合が始まる";
    });
  </script>
</body>
</html>
