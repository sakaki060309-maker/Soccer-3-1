<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer UI Phase0</title>

  <style>
    /* =========================================================
       1. 全体
    ========================================================= */
    body {
      margin: 0;
      background: #e9e9e9;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
    }

    /* =========================================================
       2. ログ欄
    ========================================================= */
    .log-box {
      height: 520px;
      border: 4px solid #1e88e5;
      background: white;
      margin-bottom: 30px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* 開始ボタン */
    #startBtn {
      padding: 16px 36px;
      font-size: 32px;
      font-weight: bold;
      border: 3px solid #1e88e5;
      background: white;
      color: #1565c0;
      cursor: pointer;
      border-radius: 12px;
    }

    /* ログエリア */
    #logList {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      font-size: 32px;
      display: none;
    }

    .log-item {
      margin-bottom: 12px;
    }

    /* =========================================================
       3. スコア
    ========================================================= */
    .score-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .score-box {
      border: 4px solid #1e88e5;
      background: white;
      min-height: 150px;
      padding: 20px;
      color: #1565c0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .score-team {
      font-size: 48px;
      font-weight: bold;
    }

    .score-value {
      font-size: 56px;
      font-weight: bold;
    }

    /* =========================================================
       4. 下メニュー
    ========================================================= */
    .menu-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .menu-btn {
      border: 4px solid #1e88e5;
      background: white;
      height: 90px;
      font-size: 40px;
      font-weight: bold;
      color: #1565c0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- =========================================================
         5. ログ欄
    ========================================================= -->
    <div class="log-box">

      <!-- 5.1 最初だけ -->
      <button id="startBtn">試合開始</button>

      <!-- 5.2 ログ表示 -->
      <div id="logList"></div>

    </div>

    <!-- =========================================================
         6. スコア
    ========================================================= -->
    <div class="score-row">
      <div class="score-box">
        <div class="score-team">Home</div>
        <div class="score-value">0</div>
      </div>

      <div class="score-box">
        <div class="score-team">Away</div>
        <div class="score-value">0</div>
      </div>
    </div>

    <!-- =========================================================
         7. 下メニュー
    ========================================================= -->
    <div class="menu-row">
      <div class="menu-btn">試合</div>
      <div class="menu-btn">チーム</div>
      <div class="menu-btn">？</div>
      <div class="menu-btn">？</div>
    </div>

  </div>

  <script>
    // =========================================================
    // 8. 要素取得
    // =========================================================
    const startBtn = document.getElementById("startBtn");
    const logList = document.getElementById("logList");

    // =========================================================
    // 9. ログ追加関数
    // =========================================================
    function addLog(text) {
      const row = document.createElement("div");
      row.className = "log-item";
      row.textContent = text;
      logList.prepend(row);
    }

    // =========================================================
    // 10. 試合開始
    // =========================================================
    startBtn.addEventListener("click", () => {
      // ボタン消す
      startBtn.style.display = "none";

      // ログモードON
      logList.style.display = "block";

      // 最初のログ
      addLog("キックオフ");
    });
  </script>
</body>
</html>
