<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer UI Phase0</title>

  <style>
    /* =========================================================
       1. 全体
    ========================================================= */
    body {
      margin: 0;
      background: #e9e9e9;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
    }

    /* =========================================================
       2. 上の箱
    ========================================================= */
    .log-box {
      height: 520px;
      border: 4px solid #1e88e5;
      background: white;
      margin-bottom: 30px;
      padding: 20px;
      box-sizing: border-box;
      position: relative;
    }

    /* 2.1 開始前の中央ボタン */
    #startBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 36px;
      font-size: 32px;
      font-weight: bold;
      border: 3px solid #1e88e5;
      background: white;
      color: #1565c0;
      cursor: pointer;
      border-radius: 12px;
    }

    #startBtn:hover {
      background: #e3f2fd;
    }

    /* 2.2 試合開始後の表示エリア */
    #matchView {
      display: none;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      display: none;
      flex-direction: column;
    }

    /* 2.3 時間表示 */
    #timeBox {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      color: #1565c0;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    /* 2.4 ログ表示 */
    #logList {
      flex: 1;
      overflow-y: auto;
      font-size: 32px;
      color: #333;
      padding: 10px;
      border: 3px solid #1e88e5;
      box-sizing: border-box;
    }

    .log-item {
      margin-bottom: 14px;
      line-height: 1.4;
    }

    /* =========================================================
       3. スコア
    ========================================================= */
    .score-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .score-box {
      border: 4px solid #1e88e5;
      background: white;
      min-height: 150px;
      padding: 20px;
      color: #1565c0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-sizing: border-box;
    }

    .score-team {
      font-size: 48px;
      font-weight: bold;
    }

    .score-value {
      font-size: 56px;
      font-weight: bold;
    }

    /* =========================================================
       4. 下メニュー
    ========================================================= */
    .menu-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .menu-btn {
      border: 4px solid #1e88e5;
      background: white;
      height: 90px;
      font-size: 40px;
      font-weight: bold;
      color: #1565c0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    /* =========================================================
       5. 小画面
    ========================================================= */
    @media (max-width: 700px) {
      .log-box {
        height: 380px;
      }

      #startBtn {
        font-size: 24px;
        padding: 12px 24px;
      }

      #timeBox {
        font-size: 34px;
      }

      #logList {
        font-size: 24px;
      }

      .score-team {
        font-size: 32px;
      }

      .score-value {
        font-size: 40px;
      }

      .menu-btn {
        font-size: 28px;
        height: 70px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- =========================================================
         6. 上の箱
    ========================================================= -->
    <div class="log-box">

      <!-- 6.1 開始前 -->
      <button id="startBtn">試合開始</button>

      <!-- 6.2 開始後 -->
      <div id="matchView">
        <div id="timeBox">00:00</div>
        <div id="logList"></div>
      </div>

    </div>

    <!-- =========================================================
         7. スコア
    ========================================================= -->
    <div class="score-row">
      <div class="score-box">
        <div class="score-team">Home</div>
        <div class="score-value">0</div>
      </div>

      <div class="score-box">
        <div class="score-team">Away</div>
        <div class="score-value">0</div>
      </div>
    </div>

    <!-- =========================================================
         8. 下メニュー
    ========================================================= -->
    <div class="menu-row">
      <div class="menu-btn">試合</div>
      <div class="menu-btn">チーム</div>
      <div class="menu-btn">？</div>
      <div class="menu-btn">？</div>
    </div>

  </div>

  <script>
    // =========================================================
    // 9. 要素取得
    // =========================================================
    const startBtn = document.getElementById("startBtn");
    const matchView = document.getElementById("matchView");
    const timeBox = document.getElementById("timeBox");
    const logList = document.getElementById("logList");

    // =========================================================
    // 10. 状態
    // =========================================================
    let matchSeconds = 0;
    let timerId = null;

    // =========================================================
    // 11. 時間表示
    // =========================================================
    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
    }

    function updateTime() {
      timeBox.textContent = formatTime(matchSeconds);
    }

    // =========================================================
    // 12. ログ追加
    // =========================================================
    function addLog(text) {
      const row = document.createElement("div");
      row.className = "log-item";
      row.textContent = text;
      logList.prepend(row);
    }

    // =========================================================
    // 13. 試合開始
    // =========================================================
    startBtn.addEventListener("click", () => {
      // 13.1 ボタンを消す
      startBtn.style.display = "none";

      // 13.2 時間＋ログ表示を出す
      matchView.style.display = "flex";

      // 13.3 初期表示
      matchSeconds = 0;
      updateTime();
      addLog("キックオフ");

      // 13.4 時間を進める
      timerId = setInterval(() => {
        matchSeconds += 1;
        updateTime();
      }, 1000);
    });
  </script>
</body>
</html>
